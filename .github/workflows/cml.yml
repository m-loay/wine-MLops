name: model-wine-quality

on: [push]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  run:
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/iterative/cml:0-dvc3-base1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train model
        env:
          # GitHub token is required by CML to:
          # - Post comments on PRs
          # - Upload images (plots)
          # - Interact with GitHub API
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global --add safe.directory /__w/wine-MLops/wine-MLops
          git config --global --add safe.directory /__w/wine-MLops/wine-MLops
          dvc repro

          git fetch --prune
          
          # Use 'metrics show' to get the current values in Markdown
          echo "## Current Model Metrics" > report.md
          dvc metrics show --show-md >> report.md 

          # Add your visualizations
          echo "" >> report.md
          echo "## Data viz" >> report.md
          echo "![Feature Importance](./feature_importance.png)" >> report.md
          echo "![Residuals](./residuals.png)" >> report.md

          cml comment create report.md

