stages:
  preprocess_data:
    cmd: python preprocess_data.py
    deps:
    - preprocess_data.py
    - wine_quality.csv
    outs:
    - data_processed_wine_quality.csv
  train:
    cmd: python train.py
    deps:
    - train.py
    - data_processed_wine_quality.csv
    outs:
    - feature_importance.png
    - residuals.png
    metrics:
    - metrics.txt:
        cache: false
